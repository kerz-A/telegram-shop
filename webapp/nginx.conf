server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to Django
    location /api/ {
        proxy_pass http://admin_panel:8000/api/;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve media files directly from shared volume (^~ = higher priority than regex)
    location ^~ /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Proxy admin panel (optional, for convenience)
    location /admin/ {
        proxy_pass http://admin_panel:8000/admin/;
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy Django static (for admin panel)
    location /static/ {
        proxy_pass http://admin_panel:8000/static/;
        proxy_set_header Host localhost;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/plain application/javascript text/css application/json image/svg+xml;
    gzip_min_length 256;
}
